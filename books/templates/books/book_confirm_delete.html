{% extends "books/base.html" %}

{% block title %}
Confirm Book Delete
{% endblock %}

{% block content %}
    <p>Are you sure you want to delete this book?</p>
    <p>{{ book }}</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes</button>
    </form>

    <a class="cancel-delete" href="{% url 'home' %}">No, take me back</a>

{% endblock %}
